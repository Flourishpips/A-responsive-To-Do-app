<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>To-do App</title>
</head>
<body class="bg-black theme-card">
    <div class="w-[100%] h-fit relative font-sans">
        <img class="w-[100%] h-100" src="images/bg-mobile-dark.jpg" alt="mobile-dark">
        <div class="w-[80%] h-fit absolute top-20 justify-self-center gap-20">
            <div class="flex w-[100%]">
                <h1 class="text-4xl font-bold text-white tracking-[15px]">TODO</h1>
                <button id="themeToggleBtn" class="ml-auto"><img id="themeIcon" class="sun w-10" src="images/icon-sun.svg" alt="sun"></button>
            </div>
            <form id="todo-form" class="theme-card flex items-center gap-4 bg-[#25273c] rounded-lg px-5 py-4 mb-4 mt-20">
                <span class="w-5 h-5 rounded-full border-2 border-[#777990]"></span>
                <input
                id="todo-input"
                type="text"
                placeholder="Create a new todo..."
                class="flex-1 bg-transparent outline-none text-white placeholder:text-[#777990]"
                >
            </form>
            <div class="theme-card bg-[#25273c] rounded-lg">
              <div id="todo-list" class="theme-card bg-[#25273c] rounded-lg overflow-hidden mb-4"></div>
                  
              <div class="theme-card flex items-center justify-between bg-[#25273c] rounded-lg px-5 py-4 text-sm text-[#777990] mb-4">
                  <span id="items-left" class="text-[#777990]">0 items left</span>
                  <button id="clearCompletedBtn" class="text-[#777990] ml-auto">Clear Completed</button>
              
              </div>
            </div>
            <div class="theme-card w-[100%] h-18 bg-[#25273c] mt-10 mb-10 rounded-lg text-white flex gap-5 texts-center place-content-center">
                <button data-filter="all" class="filter-btn text-[#777990]">All</button>
                <button data-filter="active" class="filter-btn text-[#777990]">Active</button>
                <button data-filter="completed" class="filter-btn text-[#777990]">Completed</button>
            </div>

            <p class="text-[#777990] justify-self-center mb-20">Drag and drop to reorder list</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
